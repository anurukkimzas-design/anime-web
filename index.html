<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Anime Web</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

/* header */
header{
background:#020617;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:bold;
color:#38bdf8;
}

nav a{
margin-right:15px;
color:white;
text-decoration:none;
}

nav a:hover{
color:#38bdf8;
}

.search{
padding:10px;
border-radius:8px;
border:none;
}

/* layout */
.container{
display:grid;
grid-template-columns:3fr 1fr;
gap:25px;
padding:30px;
}

/* anime grid */
.anime-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
}

.card{
background:#111827;
border-radius:12px;
overflow:hidden;
transition:0.2s;
}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 15px #000;
}

.card-info{
padding:10px;
}

/* sidebar */
.sidebar{
background:#111827;
padding:20px;
border-radius:12px;
height:fit-content;
}

.popular{
display:flex;
align-items:center;
margin-bottom:15px;
}

.popular img{
width:50px;
height:70px;
object-fit:cover;
margin-right:10px;
border-radius:6px;
}

/* section title */
.section-title{
font-size:22px;
margin-bottom:15px;
}
</style>

</head>

<body>

<header>
<div class="logo">ANIME WEB</div>

<nav>
<a href="#">หน้าแรก</a>
<a href="#">อนิเมะล่าสุด</a>
<a href="#">ยอดนิยม</a>
<a href="#">ตารางอนิเมะ</a>
</nav>

<input class="search" placeholder="ค้นหาอนิเมะ...">
</header>

<div class="container">

<div>
<div class="section-title">อนิเมะตอนล่าสุด</div>

<div class="anime-grid">

<div class="card">
<img src="https://cdn.myanimelist.net/images/anime/1337/99013.jpg">
<div class="card-info">
<h3>Solo Leveling</h3>
<p>ตอนที่ 12</p>
</div>
</div>

<div class="card">
<img src="https://cdn.myanimelist.net/images/anime/1286/99889.jpg">

</div>
</div>

<div class="card">

<h3>One Piece</h3>

</div>
</div>

<div class="card">

<div class="card-info">
<h3>Naruto</h3>
<p>ตอนที่ 220</p>
</div>
</div>

<div class="card">
<img src="https://cdn.myanimelist.net/images/anime/1171/109222.jpg">
<div class="card-info">
<h3>Attack on Titan</h3>
<p>ตอนล่าสุด</p>
</div>
</div>

<div class="card">
<img src="https://cdn.myanimelist.net/images/anime/1764/126627.jpg">
<div class="card-info">
<h3>Jujutsu Kaisen</h3>
<p>ตอนล่าสุด</p>

</div>

</div>
</div>

<div class="sidebar">

</div>

One Piece

</body>
</html>
