<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Anime Web</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#020617;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo{
font-size:28px;
font-weight:bold;
color:#38bdf8;
}

nav a{
margin-right:15px;
color:white;
text-decoration:none;
font-size:14px;
}

nav a:hover{
color:#38bdf8;
}

.search{
padding:10px;
border-radius:8px;
border:none;
margin-top:10px;
}

.container{
display:grid;
grid-template-columns:3fr 1fr;
gap:25px;
padding:30px;
}

.anime-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
}

.card{
background:#111827;
border-radius:12px;
overflow:hidden;
transition:0.2s;
}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 15px #000;
}

.card-info{
padding:10px;
}

.sidebar{
background:#111827;
padding:20px;
border-radius:12px;
height:fit-content;
}

.popular{
display:flex;
align-items:center;
margin-bottom:15px;
}

.popular img{
width:50px;
height:70px;
object-fit:cover;
margin-right:10px;
border-radius:6px;
}

.section-title{
font-size:22px;
margin-bottom:15px;
}

@media(max-width:900px){
.container{
grid-template-columns:1fr;
}
}
</style>

</head>

<body>

<header>
<div class="logo">ANIME WEB</div>

<nav>
<a href="#">หน้าแรก</a>
<a href="#">อนิเมะล่าสุด</a>
<a href="#">ยอดนิยม</a>
<a href="#">ตารางอนิเมะ</a>
</nav>

<input id="search" class="search" placeholder="ค้นหาอนิเมะ...">
</header>

<div class="container">

<div>
<div class="section-title">อนิเมะตอนล่าสุด</div>

<div id="animeList" class="anime-grid"></div>

</div>

<div class="sidebar">

<h2>อนิเมะยอดนิยม</h2>

<div class="popular">
<img src="https://cdn.myanimelist.net/images/anime/1171/109222.jpg">
Attack on Titan
</div>

<div class="popular">
<img src="https://cdn.myanimelist.net/images/anime/1764/126627.jpg">
Jujutsu Kaisen
</div>

<div class="popular">
<img src="https://cdn.myanimelist.net/images/anime/1337/99013.jpg">
Solo Leveling
</div>

<div class="popular">
<img src="https://cdn.myanimelist.net/images/anime/6/73245.jpg">
One Piece
</div>

</div>

</div>

<script>
const animeData = [
{
title:"Solo Leveling",
episode:"ตอนที่ 12",
img:"https://cdn.myanimelist.net/images/anime/1337/99013.jpg"
},
{
title:"Demon Slayer",
episode:"ตอนที่ 8",
img:"https://cdn.myanimelist.net/images/anime/1286/99889.jpg"
},
{
title:"One Piece",
episode:"ตอนที่ 1100",
img:"https://cdn.myanimelist.net/images/anime/6/73245.jpg"
},
{
title:"Naruto",
episode:"ตอนที่ 220",
img:"https://cdn.myanimelist.net/images/anime/13/17405.jpg"
},
{
title:"Attack on Titan",
episode:"ตอนล่าสุด",
img:"https://cdn.myanimelist.net/images/anime/1171/109222.jpg"
},
{
title:"Jujutsu Kaisen",
episode:"ตอนล่าสุด",
img:"https://cdn.myanimelist.net/images/anime/1764/126627.jpg"
}
];

const list = document.getElementById("animeList");

function showAnime(data){
list.innerHTML="";
data.forEach(a=>{
list.innerHTML+=`
<div class="card">
<img src="${a.img}">
<div class="card-info">
<h3>${a.title}</h3>
<p>${a.episode}</p>
</div>
</div>
`;
});
}

showAnime(animeData);

document.getElementById("search").addEventListener("input", function(){
const value = this.value.toLowerCase();
const filtered = animeData.filter(a=>a.title.toLowerCase().includes(value));
showAnime(filtered);
});
</script>

</body>
</html>
