<!DOCTYPE html>
<html>
<head>
<title>Anime</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<div class="logo">ANIME STREAM</div>
</header>

<div class="container" id="anime"></div>

<script src="data.js"></script>

<script>
const url = new URLSearchParams(window.location.search);
const id = url.get("id");

const anime = animeData.find(a=>a.id==id);

document.getElementById("anime").innerHTML=`
<h1>${anime.title}</h1>
<img src="${anime.img}" width="300">
<p>${anime.desc}</p>
<button onclick="watch()">ดูตอน</button>
`;

function watch(){
window.location="watch.html?id="+id;
}
</script>

</body>
</html>
